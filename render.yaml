services:
  - type: web
    name: on-the-move-api
    env: node
    plan: free
    buildCommand: cd mvp/backend && npm install
    startCommand: cd mvp/backend && npm start
    envVars:
      - key: NODE_ENV
        value: production
      - key: PORT
        value: 5000
      - key: DATABASE_URL
        fromDatabase:
          name: on-the-move-db
          property: connectionString
      - key: REDIS_URL
        value: ""

databases:
  - name: on-the-move-db
    plan: free