services:
  - type: web
    name: on-the-move-api
    env: node
    plan: free
    buildCommand: npm install
    startCommand: npm start
    envVars:
      - key: NODE_ENV
        value: production
      - key: PORT
        value: 5000
      - key: DATABASE_URL
        fromDatabase:
          name: on-the-move-db
          property: connectionString
      - key: REDIS_URL
        fromService:
          type: redis
          name: on-the-move-cache
          property: connectionString

databases:
  - name: on-the-move-db
    plan: free

redis:
  - name: on-the-move-cache
    plan: free
    ipAllowList: [] # only allow internal connections
